name: Setup Monorepo
description: nx-set-shas, Node from .nvmrc, Nx Cloud start-ci-run, npm ci. Caller MUST run actions/checkout@v4 with fetch-depth 0 first.

inputs:
  cloud-distribute:
    description: "Argument for nx-cloud start-ci-run --distribute-on"
    required: false
    default: ".nx/workflows/dynamic-changesets.yaml"
  run-nx-cloud:
    description: "Whether to bracket the run with Nx Cloud distributed execution"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Derive SHAs for nx affected
      uses: nrwl/nx-set-shas@v4

    - uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Start Nx Cloud CI run
      if: inputs.run-nx-cloud == 'true'
      shell: bash
      run: npx --yes nx-cloud start-ci-run --distribute-on="${{ inputs.cloud-distribute }}"

    - name: Install dependencies
      shell: bash
      run: npm ci
