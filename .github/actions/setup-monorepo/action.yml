name: Setup Monorepo
description: pnpm (via packageManager pin) + Node from .nvmrc, frozen install, Turborepo local cache. Caller MUST run actions/checkout@v5 with fetch-depth 0 first.

inputs:
  cache-turbo:
    description: "Whether to cache the Turborepo local cache across runs."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install pnpm (version from packageManager field)
      uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Cache Turborepo computation
      if: inputs.cache-turbo == 'true'
      uses: actions/cache@v4
      with:
        # turbo 2.x writes its local cache under .turbo/cache; older layouts
        # used node_modules/.cache/turbo — cache both to be version-proof.
        path: |
          .turbo/cache
          node_modules/.cache/turbo
        # Restore latest by branch; key is unique per commit so we always write a fresh entry.
        key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.ref_name }}-
          ${{ runner.os }}-turbo-
