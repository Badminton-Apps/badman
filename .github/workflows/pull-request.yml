name: Pull Request Validation

on:
  pull_request:
  merge_group:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo

      - name: Run affected lint + test
        # Build deliberately excluded — deploy workflows (deploy-staging.yml,
        # deploy-production.yml) run it on push. PR checks stay fast.
        # --affected compares against the PR base (TURBO_SCM_BASE).
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: pnpm turbo run lint test --affected --concurrency=3
