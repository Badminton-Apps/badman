name: Pull Request Validation

on:
  pull_request:
  merge_group:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo

      - name: Run affected lint + test (parallel)
        # Build deliberately excluded — deploy workflows (deploy-staging.yml,
        # deploy-production.yml) run it on push. PR checks stay fast.
        run: npx --yes nx affected -t lint test -c ci --parallel=3
