name: Pull Request Validation

on:
  pull_request:
  merge_group:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo

      - name: Resolve legacy projects (scope:legacy tag)
        id: legacy
        run: echo "list=$(node scripts/ci/legacy-projects.js)" >> "$GITHUB_OUTPUT"

      - name: Run affected lint + test (parallel)
        # Build deliberately excluded — deploy workflows (deploy-staging.yml,
        # deploy-production.yml) run it on push. PR checks stay fast.
        # Legacy frontend + e2e excluded per Constitution V.
        # AUTHORITATIVE during the Nx→Turborepo migration Stage A (feature 036).
        run: npx --yes nx affected -t lint test -c ci --parallel=3 --exclude="${{ steps.legacy.outputs.list }}"

      - name: "[036 Stage A] Turborepo double-run (non-blocking parity check)"
        # Shadow-run the same tasks through Turborepo to verify it selects the
        # same affected set and pass/fail as Nx before Nx is removed (spec FR-017,
        # SC-013). Non-blocking until parity is trusted, then promoted to
        # authoritative and the Nx line above is removed (start of Stage B).
        # nx-set-shas (in setup-monorepo) exports NX_BASE/NX_HEAD; map them to
        # Turborepo's SCM range.
        continue-on-error: true
        env:
          TURBO_SCM_BASE: ${{ env.NX_BASE }}
          TURBO_SCM_HEAD: ${{ env.NX_HEAD }}
        # --concurrency=1: during Stage A the per-package scripts wrap the Nx CLI
        # (`nx lint/test <proj>`). Running several `nx` processes at once races on
        # Nx project-graph computation ("no name provided: scripts"), so the
        # parity shadow must serialize the Nx invocations. Turborepo's own
        # parallelism returns in Stage B once the scripts call jest/eslint/tsc
        # directly (no Nx). turbo.json also drops `^build` on lint/test for Stage A
        # because Nx already resolves build deps internally.
        run: npx --yes turbo run lint test --affected --concurrency=1
