name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Explicit version to release (e.g. 7.0.0). Leave empty to derive from conventional commits."
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

run-name: Prod release ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      NEW_VERSION: ${{ steps.create_release.outputs.new_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Merge develop -> main
        if: github.ref == 'refs/heads/main'
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: develop
          target_branch: main
          message: "chore(merge): merge develop into main"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Override Base to last release tag
        run: |
          TAG_VERSION=$(git describe --match 'v*' --abbrev=0 --tags)
          echo "Found tag: $TAG_VERSION"
          LAST_TAG_HASH=$(git rev-list -n 1 $TAG_VERSION)
          echo "Found hash: $LAST_TAG_HASH"
          echo "NX_BASE=$LAST_TAG_HASH" >> $GITHUB_ENV
          echo "NX_HEAD=origin/${{ github.ref_name }}" >> $GITHUB_ENV

      - uses: ./.github/actions/setup-monorepo

      - name: Resolve legacy projects (scope:legacy tag)
        id: legacy
        run: echo "list=$(node scripts/ci/legacy-projects.js)" >> "$GITHUB_OUTPUT"

      - name: Run affected lint, test, build
        run: npx --yes nx affected -t lint test build -c ci --exclude="${{ steps.legacy.outputs.list }}"

      - name: Coverage reports
        run: |
          if find coverage -name "lcov.info" -type f 2>/dev/null | grep -q .; then
            echo "Coverage files found, merging..."
            npx --yes lcov-result-merger 'coverage/**/lcov.info' 'coverage/lcov.info'
          else
            echo "No coverage files found, creating empty coverage file..."
            mkdir -p coverage
            touch coverage/lcov.info
          fi

      - name: Set Git config
        run: |
          git config --local user.email "info@badman.app"
          git config --local user.name "Badman Releaser"

      - name: Create release
        id: create_release
        run: |
          if [ -n "${{ inputs.release_version }}" ]; then
            node scripts/release.js --dry-run=false --version="${{ inputs.release_version }}"
          else
            node scripts/release.js --dry-run=false
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 30

      # Back-merge main -> develop temporarily disabled.
      # Reason: main is intentionally diverging from develop while we hold
      # back features (CP export, backend encounter games generation) from
      # prod. Auto back-merge would wipe those features from develop.
      # Re-enable once main and develop are aligned again. When re-enabling,
      # the `[skip back-merge]` gate (see AGENTS.md) is the documented way
      # to opt out per-deploy.
      # - name: Merge main -> develop
      #   if: |
      #     github.ref == 'refs/heads/main' &&
      #     !contains(github.event.head_commit.message, '[skip back-merge]')
      #   uses: devmasx/merge-branch@master
      #   with:
      #     type: now
      #     from_branch: main
      #     target_branch: develop
      #     message: "chore(merge): merge main into develop"
      #     github_token: ${{ secrets.GITHUB_TOKEN }}

  migrate-prod:
    needs: build
    uses: ./.github/workflows/_shared-migrate.yml
    with:
      target-environment: production
    secrets: inherit

  deploy-prod:
    needs: migrate-prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo

      - name: Deploy
        run: npx --yes nx affected -t deploy --no-agents
        env:
          API_HOOK: ${{ secrets.PROD_API_HOOK }}
          WORKER_SYNC_HOOK: ${{ secrets.PROD_WORKER_SYNC_HOOK }}
          WORKER_RANKING_HOOK: ${{ secrets.PROD_WORKER_RANKING_HOOK }}
          GH_TOKEN_CP: ${{ secrets.GH_TOKEN_CP }}

  sentry-release:
    needs: [build, deploy-prod]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.NEW_VERSION != ''
    runs-on: ubuntu-latest
    environment: production
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: badminton-vlaanderen
      SENTRY_PROJECT: backend
      VERSION: ${{ needs.build.outputs.NEW_VERSION }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create Sentry release
        run: |
          npx --yes @sentry/cli releases new "$VERSION"
          npx --yes @sentry/cli releases set-commits "$VERSION" --auto
          npx --yes @sentry/cli releases finalize "$VERSION"
          npx --yes @sentry/cli releases deploys "$VERSION" new -e production

      - name: Verify Sentry release
        run: |
          set -euo pipefail
          release_info="$(npx --yes @sentry/cli releases list --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" | grep -F "$VERSION" || true)"
          if [[ -z "$release_info" ]]; then
            echo "::error::Sentry release '$VERSION' not found."
            exit 1
          fi
          echo "Sentry release '$VERSION' confirmed."
