name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

run-name: Prod release ${{ github.run_number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Versioning note (feature 036): `nx release` (scripts/release.js) is gone.
# release-please.yml now maintains a release PR on main; merging that PR bumps
# package.json + the apps' version.json, tags vX.Y.Z and creates the GitHub
# release. This workflow deploys every push to main and verifies the live
# server reports the version that this commit ships.
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
      VERSION_CHANGED: ${{ steps.version.outputs.CHANGED }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo

      - name: Lint, test, build
        # Full graph on deploys (no --affected): Turborepo cache keeps
        # unchanged packages near-free; deploys never skip work due to
        # base-resolution guesswork.
        run: pnpm turbo run lint test build

      - name: Coverage reports
        run: |
          if find coverage -name "lcov.info" -type f 2>/dev/null | grep -q .; then
            echo "Coverage files found, merging..."
            npx --yes lcov-result-merger 'coverage/**/lcov.info' 'coverage/lcov.info'
          else
            echo "No coverage files found, creating empty coverage file..."
            mkdir -p coverage
            touch coverage/lcov.info
          fi

      - name: Determine shipped version
        id: version
        # The version this commit ships is whatever release-please last wrote
        # to package.json. CHANGED indicates whether THIS push bumped it
        # (i.e. a release-PR merge) — gates the Sentry release.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" || echo "")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$PREV" ]; then echo "CHANGED=true" >> "$GITHUB_OUTPUT"; else echo "CHANGED=false" >> "$GITHUB_OUTPUT"; fi
          echo "Shipping version $VERSION (changed since previous commit: $([ "$VERSION" != "$PREV" ] && echo yes || echo no))"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 30

      # Back-merge main -> develop temporarily disabled.
      # Reason: main is intentionally diverging from develop while we hold
      # back features (CP export, backend encounter games generation) from
      # prod. Auto back-merge would wipe those features from develop.
      # Re-enable once main and develop are aligned again. When re-enabling,
      # the `[skip back-merge]` gate (see AGENTS.md) is the documented way
      # to opt out per-deploy.

  migrate-prod:
    needs: build
    uses: ./.github/workflows/_shared-migrate.yml
    with:
      target-environment: production
    secrets: inherit

  deploy-prod:
    needs: migrate-prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo
        with:
          cache-turbo: "false"

      - name: Deploy
        # Each deployable app's `deploy` script POSTs its Render deploy hook.
        run: pnpm turbo run deploy
        env:
          API_HOOK: ${{ secrets.PROD_API_HOOK }}
          WORKER_SYNC_HOOK: ${{ secrets.PROD_WORKER_SYNC_HOOK }}
          WORKER_RANKING_HOOK: ${{ secrets.PROD_WORKER_RANKING_HOOK }}
          GH_TOKEN_CP: ${{ secrets.GH_TOKEN_CP }}

  # The Render deploy hook is fire-and-forget: deploy-prod returns as soon as
  # the hook POST succeeds, NOT when the new build is live. This job polls the
  # public /api/version endpoint until the server reports the version this
  # commit ships, catching a stale build cache (or failed Render build) that
  # would otherwise silently keep serving old code.
  verify-prod-version:
    needs: [build, deploy-prod]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      EXPECTED_VERSION: ${{ needs.build.outputs.VERSION }}
      # URI versioning (defaultVersion "1" in main.ts) puts every route under /api/v1.
      API_URL: https://api.badman.app/api/v1/version
    steps:
      - name: Wait for live server to report shipped version
        run: |
          set -euo pipefail
          echo "Expecting version '$EXPECTED_VERSION' at $API_URL"
          deadline=$((SECONDS + 900)) # 15 min — covers Render build + boot
          attempt=0
          while [ "$SECONDS" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            live="$(curl -fsS --max-time 10 "$API_URL" | jq -r '.version // empty' 2>/dev/null || true)"
            echo "Attempt $attempt: live version='${live:-<unreachable>}'"
            if [ "$live" = "$EXPECTED_VERSION" ]; then
              echo "Live server is serving $EXPECTED_VERSION"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Live server never reported version '$EXPECTED_VERSION' within 15 min — stale build cache or failed Render deploy."
          exit 1

  sentry-release:
    needs: [build, deploy-prod]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.VERSION_CHANGED == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: badminton-vlaanderen
      SENTRY_PROJECT: backend
      VERSION: ${{ needs.build.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create Sentry release
        run: |
          npx --yes @sentry/cli releases new "$VERSION"
          npx --yes @sentry/cli releases set-commits "$VERSION" --auto
          npx --yes @sentry/cli releases finalize "$VERSION"
          npx --yes @sentry/cli releases deploys "$VERSION" new -e production

      - name: Verify Sentry release
        run: |
          set -euo pipefail
          release_info="$(npx --yes @sentry/cli releases list --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" | grep -F "$VERSION" || true)"
          if [[ -z "$release_info" ]]; then
            echo "::error::Sentry release '$VERSION' not found."
            exit 1
          fi
          echo "Sentry release '$VERSION' confirmed."
