name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo

      - name: Lint, test, build
        # Deploys run the FULL graph (no --affected): Turborepo's cache makes
        # unchanged packages near-free, and deploys should never skip work
        # because of base-resolution guesswork.
        run: pnpm turbo run lint test build

  migrate-staging:
    needs: build
    uses: ./.github/workflows/_shared-migrate.yml
    with:
      target-environment: staging
    secrets: inherit

  deploy-staging:
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo
        with:
          cache-turbo: "false"

      - name: Deploy
        # Each deployable app's `deploy` script POSTs its Render deploy hook.
        run: pnpm turbo run deploy
        env:
          # NOTE: the staging Render hook secrets are named BETA_* (legacy
          # naming, predates the staging branch) — do not "fix" to STAGING_*.
          API_HOOK: ${{ secrets.BETA_API_HOOK }}
          WORKER_SYNC_HOOK: ${{ secrets.BETA_WORKER_SYNC_HOOK }}
          WORKER_RANKING_HOOK: ${{ secrets.BETA_WORKER_RANKING_HOOK }}
          GH_TOKEN_CP: ${{ secrets.GH_TOKEN_CP }}
