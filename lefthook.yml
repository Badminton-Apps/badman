# Lefthook config — local Git hooks
# Installed by `npm install` (postinstall hook) or `npx lefthook install`.
# Skip with `git commit --no-verify` / `git push --no-verify` when needed.

pre-commit:
  parallel: true
  jobs:
    - name: eslint
      glob: "*.{js,jsx,ts,tsx}"
      # Stage any auto-fixes lefthook applies; ESLint exits non-zero on
      # remaining errors so the commit is blocked.
      run: npx eslint --fix {staged_files} && git add {staged_files}

    - name: prettier
      glob: "*.{js,jsx,ts,tsx,json,md,yml,yaml,scss,css,html,pug}"
      exclude:
        - "packages/utils/src/lib/i18n.generated.ts"
        - "**/CHANGELOG.md"
        - "**/all.json"
      run: npx prettier --write {staged_files} && git add {staged_files}

pre-push:
  jobs:
    - name: affected-lint
      # Mirror the CI lint gate so issues like the `\Z` regex escape don't
      # only surface after a 10-minute pipeline.
      run: |
        BASE_REF=$(git merge-base HEAD origin/develop 2>/dev/null || git merge-base HEAD origin/main 2>/dev/null || git rev-parse HEAD~1)
        TURBO_SCM_BASE="$BASE_REF" pnpm turbo run lint --affected --output-logs=errors-only
