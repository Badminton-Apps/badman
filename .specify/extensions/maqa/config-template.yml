# MAQA — Multi-Agent & Quality Assurance
# Generated by: specify ext add maqa
# Docs: https://github.com/spec-kit-maqa/spec-kit-maqa

# ── Test runner ───────────────────────────────────────────────────────────────
# Leave empty to skip all test steps.
test_command: ""          # Full suite  e.g. "npm test", "pytest", "bundle exec rspec"
test_file_command: ""     # Single file e.g. "pytest {file}", "npm test -- {file}"

# ── TDD mode ──────────────────────────────────────────────────────────────────
# When true: write test first → implement → confirm green.
# Red is assumed (no pre-run). Requires test_file_command to be set.
tdd: false

# ── Board integration ─────────────────────────────────────────────────────────
# "auto" detects any installed companion (maqa-trello, maqa-linear, maqa-github-projects,
# maqa-jira, maqa-azure-devops). Set explicitly to override, or "local" to skip board.
board: "auto"

# ── Parallelism ───────────────────────────────────────────────────────────────
max_parallel: 3           # Max concurrent feature agents

# ── Worktrees ─────────────────────────────────────────────────────────────────
# Worktrees are created as siblings of the repo root.
# Change if your layout requires a different base.
worktree_base: ".."       # Relative to repo root

# ── QA checks ─────────────────────────────────────────────────────────────────
# Disable checks that don't apply to your project type.
qa:
  text: true              # Spelling, grammar, placeholder copy
  links: true             # Link / route verification
  security: true          # Unfiltered output, exposed params, missing auth
  accessibility: false    # WCAG 2.1 AA — enable for web projects
  responsive: false       # Mobile / responsive layout — enable for web projects
  empty_states: false     # Empty / error state coverage — enable for UI projects
